name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --no-deps .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests
      - name: Validate allowed fixture
        run: permitmesh authorize examples/contract.valid.json examples/request.allowed.json --evaluation-time 2026-07-23T12:00:00Z
      - name: Verify denied fixture
        shell: bash
        run: |
          set +e
          permitmesh authorize examples/contract.valid.json examples/request.denied.json --evaluation-time 2026-07-23T12:00:00Z
          code=$?
          set -e
          test "$code" -eq 3
