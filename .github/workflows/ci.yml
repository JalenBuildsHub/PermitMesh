name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install ".[test]"
      - run: python -m ruff format --check src tests
      - run: python -m ruff check src tests
      - run: python -m mypy src
      - run: python -m bandit -q -r src
      - run: python -m build
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests
      - run: permitmesh conformance examples/conformance-suite.json
      - name: Validate allowed fixture
        run: permitmesh authorize examples/contract.valid.json examples/request.allowed.json --evaluation-time 2026-07-23T12:00:00Z
      - name: Verify denied fixture
        shell: bash
        run: |
          set +e
          permitmesh authorize examples/contract.valid.json examples/request.denied.json --evaluation-time 2026-07-23T12:00:00Z
          code=$?
          set -e
          test "$code" -eq 3
